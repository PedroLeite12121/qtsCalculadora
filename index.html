<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="calculadora">
            <div id="visor"></div>
            <div class="botoes">
                <div class="leftButtons">
                    <button id="sete"    class="numero">7</button>
                    <button id="oito"    class="numero">8</button>
                    <button id="nove"    class="numero">9</button>
                    <button id="quatro"  class="numero">4</button>
                    <button id="cinco"   class="numero">5</button>
                    <button id="seis"    class="numero">6</button>
                    <button id="um"      class="numero">1</button>
                    <button id="dois"    class="numero">2</button>
                    <button id="tres"    class="numero">3</button>
                    <button id="zero"    class="numero">0</button>
                    <button id="ponto">.</button>
                    <button id="igual">=</button>
                </div>

                <div class="operators">
                    <button id="apagar">C</button>
                    <button id="mais">+</button>
                    <button id="menos">-</button>
                    <button id="multiplicacao">x</button>
                    <button id="divisao">/</button>
                </div>
                
                
                
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
